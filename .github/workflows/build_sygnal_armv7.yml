name: Build Sygnal ARMv7

on:
  push:
    branches: 
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Clone Element-web source
      # -----------------------------
      - name: Clone Sygnal source
        run: |
          git clone https://github.com/element-hq/sygnal.git sygnal
          cd sygnal
          git checkout main
        
      - name: Set lowercase owner
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARMv7 image
        uses: docker/build-push-action@v6
        with:
          context: sygnal
          file: sygnal/docker/Dockerfile
          platforms: linux/armv7 # linux/arm/v7
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/sygnal:armv7
